<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureo 880 - Unidad 1C</title>
    <style>
        :root {
            --azul-oscuro: #0a192f;
            --azul-card: #112240;
            --dorado: #B8963E;
            --blanco: #e6f1ff;
            --gris: #8892b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--azul-oscuro);
            color: var(--blanco);
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0; }
        .logo { color: var(--dorado); font-size: 2.5rem; letter-spacing: 5px; font-weight: 300; }
        
        .main-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .price-card {
            background: var(--azul-card);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border-left: 5px solid var(--dorado);
        }
        .price { font-size: 2.5rem; color: var(--dorado); font-weight: bold; }

        .specs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .spec-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
        }
        .spec-label { color: var(--gris); font-size: 0.8rem; text-transform: uppercase; }
        .spec-value { font-size: 1.1rem; }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; 
            margin-top: 30px;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(184,150,62,0.3);
        }

        .btn-whatsapp {
            display: block;
            background-color: #25d366;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <p style="color: var(--gris); letter-spacing: 2px;">AUREO 880 - SAN FERNANDO</p>
        <h1 class="logo">UNIDAD 1C</h1>
    </header>

    <div class="main-info">
        <div class="price-card">
            <p class="spec-label">VALOR</p>
            <div class="price">USD 115.000</div>
            <p style="font-size: 0.8rem; margin-top: 10px;">COCHERA CUBIERTA INCLUIDA</p>
        </div>
        <div class="specs-grid">
            <div class="spec-item"><p class="spec-label">Ambientes</p><p class="spec-value">2 Ambientes</p></div>
            <div class="spec-item"><p class="spec-label">Expensas</p><p class="spec-value">$100.000</p></div>
            <div class="spec-item"><p class="spec-label">Superficie</p><p class="spec-value">60 m² Totales</p></div>
            <div class="spec-item"><p class="spec-label">Estado</p><p class="spec-value">Apto Crédito</p></div>
        </div>
    </div>

    <div class="gallery">
        <img src="PHOTO-2025-12-03-15-28-17.jpg">
        <img src="PHOTO-2025-12-03-15-28-18.jpg">
        <img src="PHOTO-2025-12-03-15-28-26%202.jpg">
        <img src="PHOTO-2025-12-03-15-28-26%204.jpg">
        <img src="PHOTO-2025-12-03-15-28-26%205.jpg">
        <img src="PHOTO-2025-12-03-15-28-26%206.jpg">
        <img src="PHOTO-2025-12-03-15-28-26%207.jpg">
        <img src="PHOTO-2025-12-03-15-28-26%208.jpg">
        <img src="PHOTO-2025-12-03-15-28-26%209.jpg">
    </div>

    <a href="https://wa.me/541173697105?text=Hola%20Enmanuel,%20me%20interesa%20la%20unidad%201C%20de%20Aureo%20880" class="btn-whatsapp">
        CONTACTAR A ENMANUEL POR WHATSAPP
    </a>

    <footer style="text-align: center; padding: 40px; color: var(--gris); font-size: 0.8rem;">
        9 de Julio 880, San Fernando, Buenos Aires.
    </footer>
</div>

</body>
</html>
